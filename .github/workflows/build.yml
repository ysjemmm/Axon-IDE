name: Build Axon IDE

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Build which platforms?'
        type: choice
        default: 'all'
        options:
          - all
          - windows-only
          - macos-only
      release_tag:
        description: 'Release tag, leave empty to use an auto-generated build tag'
        required: false
        default: ''

permissions:
  contents: write

env:
  ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

jobs:
  # =========================================================================
  # Prepare GitHub Release
  # =========================================================================
  prepare-release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Resolve release tag
        id: release
        run: |
          if [ -n "${{ inputs.release_tag }}" ]; then
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=build-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: Axon IDE ${{ steps.release.outputs.tag }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =========================================================================
  # Windows x64
  # =========================================================================
  build-windows:
    if: ${{ inputs.platforms == 'all' || inputs.platforms == 'windows-only' }}
    name: Windows x64
    runs-on: windows-2025
    needs: prepare-release
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci --ignore-scripts
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tsgo native binary
        run: npm rebuild @typescript/native-preview
        shell: bash

      - name: Locate Visual Studio
        shell: pwsh
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          if (-not $vsPath) { Write-Error "vswhere returned no VS installation"; exit 1 }
          Write-Host "VS Path: $vsPath"
          echo "VS2022_INSTALL=$vsPath" >> $env:GITHUB_ENV

      - name: Setup native build environment
        run: node build/npm/preinstall.ts
        shell: bash
        env:
          vs2022_install: ${{ env.VS2022_INSTALL }}

      - name: Rebuild native addons for Electron (x64)
        run: |
          npm exec @electron/rebuild -- --version $(node -p "require('./node_modules/electron/package.json').version") --arch x64 --force
        shell: bash

      - name: Install extension dependencies
        continue-on-error: true
        run: node build/npm/postinstall.ts
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_command: install

      - name: Build Axon extension bundle
        shell: bash
        run: |
          git clone --depth=1 --branch master \
            https://x-access-token:${{ secrets.AXON_REPO_TOKEN }}@github.com/ysjemmm/Axon.git /tmp/Axon

          cd /tmp/Axon
          corepack enable
          pnpm install --no-frozen-lockfile

          # Sequential build — turbo's dependency graph sometimes races on CI
          # ✅ Fix: explicitly pass --outDir dist so .d.ts files always land in dist/
          cd /tmp/Axon/packages/core && npx tsc --declaration --outDir dist && cd /tmp/Axon
          cd /tmp/Axon/packages/host-node && npx tsc --outDir dist && cd /tmp/Axon
          cd /tmp/Axon/packages/host-vscode && npx tsc --outDir dist && cd /tmp/Axon

          # ✅ 验证关键产物存在
          test -f /tmp/Axon/packages/core/dist/index.js       || (echo "core build missing" && exit 1)
          test -f /tmp/Axon/packages/core/dist/index.d.ts     || (echo "core types missing" && exit 1)
          test -f /tmp/Axon/packages/host-node/dist/index.js  || (echo "host-node build missing" && exit 1)

          # Symlink built packages into extension's node_modules
          mkdir -p "$GITHUB_WORKSPACE/extensions/axon-ide/node_modules/@axon"
          ln -sf /tmp/Axon/packages/core        "$GITHUB_WORKSPACE/extensions/axon-ide/node_modules/@axon/core"
          ln -sf /tmp/Axon/packages/host-vscode "$GITHUB_WORKSPACE/extensions/axon-ide/node_modules/@axon/host-vscode"
          ln -sf /tmp/Axon/packages/host-node   "$GITHUB_WORKSPACE/extensions/axon-ide/node_modules/@axon/host-node"

          # Bundle extension entry point
          cd "$GITHUB_WORKSPACE"
          node extensions/axon-ide/esbuild.mjs

      - name: Verify Axon extension bundle
        shell: pwsh
        run: |
          if (!(Test-Path "extensions\axon-ide\dist\extension.js")) {
            Write-Error "Missing extensions\axon-ide\dist\extension.js"
            exit 1
          }

      - name: Build & Package
        run: npm run gulp vscode-win32-x64
        shell: bash

      - name: Verify packaged Axon extension
        shell: pwsh
        run: |
          $appDir = Join-Path (Split-Path $PWD -Parent) "VSCode-win32-x64"
          $extensionJs = Join-Path $appDir "resources\app\extensions\axon-ide\dist\extension.js"
          if (!(Test-Path $extensionJs)) {
            Write-Error "Packaged Axon extension is missing: $extensionJs"
            exit 1
          }

      - name: Create portable zip
        shell: pwsh
        run: |
          $src = Join-Path (Split-Path $PWD -Parent) "VSCode-win32-x64"
          $dst = "$PWD\.build\Axon-IDE-win32-x64-portable.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $dst
          Write-Host "Portable zip: $dst ($((Get-Item $dst).Length) bytes)"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Create installer
        shell: pwsh
        run: |
          $appDir = Join-Path (Split-Path $PWD -Parent) "VSCode-win32-x64"
          $outDir = "$PWD\.build"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppDir="$appDir" /DOutputDir="$outDir" build\win32\axon-ide.iss
          Write-Host "Installer: $outDir\Axon-IDE-win32-x64-setup.exe ($((Get-Item "$outDir\Axon-IDE-win32-x64-setup.exe").Length) bytes)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: Axon-IDE-win32-x64
          path: |
            .build/Axon-IDE-win32-x64-portable.zip
            .build/Axon-IDE-win32-x64-setup.exe
          retention-days: 7

      - name: Upload Windows assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          files: |
            .build/Axon-IDE-win32-x64-portable.zip
            .build/Axon-IDE-win32-x64-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =========================================================================
  # macOS arm64 (Apple Silicon)
  # =========================================================================
  build-macos-arm64:
    if: ${{ inputs.platforms == 'all' || inputs.platforms == 'macos-only' }}
    name: macOS arm64
    runs-on: macos-15
    needs: prepare-release
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tsgo native binary
        run: npm rebuild @typescript/native-preview

      - name: Setup native build environment
        run: node build/npm/preinstall.ts

      - name: Rebuild native addons for Electron (arm64)
        run: |
          npm exec @electron/rebuild -- --version $(node -p "require('./node_modules/electron/package.json').version") --arch arm64 --force

      - name: Install extension dependencies
        continue-on-error: true
        run: node build/npm/postinstall.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_command: install

      - name: Build Axon extension bundle
        run: |
          git clone --depth=1 --branch master \
            https://x-access-token:${{ secrets.AXON_REPO_TOKEN }}@github.com/ysjemmm/Axon.git /tmp/Axon

          cd /tmp/Axon
          corepack enable
          pnpm install --no-frozen-lockfile

          # Sequential build — turbo's dependency graph sometimes races on CI
          # ✅ Fix: explicitly pass --outDir dist so .d.ts files always land in dist/
          cd /tmp/Axon/packages/core && npx tsc --declaration --outDir dist && cd /tmp/Axon
          cd /tmp/Axon/packages/host-node && npx tsc --outDir dist && cd /tmp/Axon
          cd /tmp/Axon/packages/host-vscode && npx tsc --outDir dist && cd /tmp/Axon

          # ✅ 验证关键产物存在
          test -f /tmp/Axon/packages/core/dist/index.js       || (echo "core build missing" && exit 1)
          test -f /tmp/Axon/packages/core/dist/index.d.ts     || (echo "core types missing" && exit 1)
          test -f /tmp/Axon/packages/host-node/dist/index.js  || (echo "host-node build missing" && exit 1)

          # Symlink built packages into extension's node_modules
          mkdir -p "$GITHUB_WORKSPACE/extensions/axon-ide/node_modules/@axon"
          ln -sf /tmp/Axon/packages/core        "$GITHUB_WORKSPACE/extensions/axon-ide/node_modules/@axon/core"
          ln -sf /tmp/Axon/packages/host-vscode "$GITHUB_WORKSPACE/extensions/axon-ide/node_modules/@axon/host-vscode"
          ln -sf /tmp/Axon/packages/host-node   "$GITHUB_WORKSPACE/extensions/axon-ide/node_modules/@axon/host-node"

          # Bundle extension entry point
          cd "$GITHUB_WORKSPACE"
          node extensions/axon-ide/esbuild.mjs

      - name: Verify Axon extension bundle
        run: |
          test -f extensions/axon-ide/dist/extension.js || (echo "Missing extensions/axon-ide/dist/extension.js" && exit 1)

      - name: Build & Package
        run: npm run gulp vscode-darwin-arm64

      - name: Verify packaged Axon extension
        run: |
          app_dir="$(dirname "$PWD")/VSCode-darwin-arm64"
          extension_js="$app_dir/resources/app/extensions/axon-ide/dist/extension.js"
          test -f "$extension_js" || (echo "Packaged Axon extension is missing: $extension_js" && exit 1)

      - name: Ad-hoc sign (arm64)
        run: |
          APP="$(dirname "$PWD")/VSCode-darwin-arm64/Axon IDE.app"
          echo "Signing: $APP"
          codesign --force --deep --sign - "$APP"
          echo "Verify:"
          codesign --verify --verbose "$APP"

      - name: Create portable zip
        run: |
          src=$(dirname "$PWD")/VSCode-darwin-arm64
          dst="$PWD/.build/Axon-IDE-darwin-arm64-portable.zip"
          mkdir -p "$PWD/.build"
          cd "$src" && zip -r "$dst" .
          echo "Portable zip: $dst ($(stat -f%z "$dst") bytes)"

      - name: Create DMG installer
        run: |
          src=$(dirname "$PWD")/VSCode-darwin-arm64
          app="$src/Axon IDE.app"
          dmg="$PWD/.build/Axon-IDE-darwin-arm64.dmg"
          rm -f "$dmg"
          tmp="$(mktemp -d)"
          cp -R "$app" "$tmp/"
          ln -s /Applications "$tmp/Applications"
          hdiutil create -volname "Axon IDE" -srcfolder "$tmp" -ov -format UDZO "$dmg"
          rm -rf "$tmp"
          echo "DMG: $dmg ($(stat -f%z "$dmg") bytes)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: Axon-IDE-darwin-arm64
          path: |
            .build/Axon-IDE-darwin-arm64-portable.zip
            .build/Axon-IDE-darwin-arm64.dmg
          retention-days: 7

      - name: Upload macOS arm64 assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          files: |
            .build/Axon-IDE-darwin-arm64-portable.zip
            .build/Axon-IDE-darwin-arm64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =========================================================================
  # macOS x64 (Intel) — disabled
  # =========================================================================
  build-macos-x64:
    if: ${{ false }}
    name: macOS x64
    runs-on: macos-13
    needs: prepare-release
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tsgo native binary
        run: npm rebuild @typescript/native-preview

      - name: Setup native build environment
        run: node build/npm/preinstall.ts

      - name: Rebuild native addons for Electron (x64)
        run: |
          npm exec @electron/rebuild -- --version $(node -p "require('./node_modules/electron/package.json').version") --arch x64 --force

      - name: Install extension dependencies
        continue-on-error: true
        run: node build/npm/postinstall.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_command: install

      - name: Build & Package
        run: npm run gulp vscode-darwin-x64

      - name: Ad-hoc sign (x64)
        run: |
          APP="$(dirname "$PWD")/VSCode-darwin-x64/Axon IDE.app"
          echo "Signing: $APP"
          codesign --force --deep --sign - "$APP"
          echo "Verify:"
          codesign --verify --verbose "$APP"

      - name: Create portable zip
        run: |
          src=$(dirname "$PWD")/VSCode-darwin-x64
          dst="$PWD/.build/Axon-IDE-darwin-x64-portable.zip"
          mkdir -p "$PWD/.build"
          cd "$src" && zip -r "$dst" .
          echo "Portable zip: $dst ($(stat -f%z "$dst") bytes)"

      - name: Create DMG installer
        run: |
          src=$(dirname "$PWD")/VSCode-darwin-x64
          app="$src/Axon IDE.app"
          dmg="$PWD/.build/Axon-IDE-darwin-x64.dmg"
          rm -f "$dmg"
          tmp="$(mktemp -d)"
          cp -R "$app" "$tmp/"
          ln -s /Applications "$tmp/Applications"
          hdiutil create -volname "Axon IDE" -srcfolder "$tmp" -ov -format UDZO "$dmg"
          rm -rf "$tmp"
          echo "DMG: $dmg ($(stat -f%z "$dmg") bytes)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: Axon-IDE-darwin-x64
          path: |
            .build/Axon-IDE-darwin-x64-portable.zip
            .build/Axon-IDE-darwin-x64.dmg
          retention-days: 7

      - name: Upload macOS x64 assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          files: |
            .build/Axon-IDE-darwin-x64-portable.zip
            .build/Axon-IDE-darwin-x64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
