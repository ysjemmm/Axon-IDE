name: Build Axon IDE

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Build which platforms?'
        type: choice
        default: 'all'
        options:
          - all
          - windows-only
          - macos-only

permissions:
  contents: read

env:
  ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

jobs:
  # =========================================================================
  # Windows x64
  # =========================================================================
  build-windows:
    if: ${{ inputs.platforms == 'all' || inputs.platforms == 'windows-only' }}
    name: Windows x64
    runs-on: windows-2025
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 1: install all deps from lock file, skip lifecycle scripts.
      # Skipping preinstall avoids the VS compiler check (which would fail
      # because the runner's VS 2022 path isn't what preinstall.ts expects).
      - name: Install dependencies
        run: npm ci --ignore-scripts
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: run preinstall manually, telling it where VS 2022 lives.
      # This installs Electron headers needed for native module compilation.
      - name: Setup native build environment
        run: node build/npm/preinstall.ts
        shell: bash
        env:
          vs2022_install: 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise'

      # Step 3: run postinstall manually with npm_command=install so extension
      # subdirectories without package-lock.json (e.g. vscode-pr-pinger) don't
      # fail on npm ci.
      - name: Install extension dependencies
        run: node build/npm/postinstall.ts
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_command: install

      - name: Build & Package
        run: npm run gulp vscode-win32-x64
        shell: bash

      - name: Create zip archive
        shell: pwsh
        run: |
          $src = Join-Path (Split-Path $PWD -Parent) "VSCode-win32-x64"
          $dst = "$PWD\.build\Axon-IDE-win32-x64.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $dst
          Write-Host "Archive: $dst ($((Get-Item $dst).Length) bytes)"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: Axon-IDE-win32-x64
          path: .build/Axon-IDE-win32-x64.zip
          retention-days: 7

  # =========================================================================
  # macOS arm64 (Apple Silicon)
  # =========================================================================
  build-macos-arm64:
    if: ${{ inputs.platforms == 'all' || inputs.platforms == 'macos-only' }}
    name: macOS arm64
    runs-on: macos-15
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup native build environment
        run: node build/npm/preinstall.ts

      - name: Install extension dependencies
        run: node build/npm/postinstall.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_command: install

      - name: Build & Package
        run: npm run gulp vscode-darwin-arm64

      - name: Create zip archive
        run: |
          src=$(dirname "$PWD")/VSCode-darwin-arm64
          dst="$PWD/.build/Axon-IDE-darwin-arm64.zip"
          cd "$src" && zip -r "$dst" .
          echo "Archive: $dst ($(stat -f%z "$dst") bytes)"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: Axon-IDE-darwin-arm64
          path: .build/Axon-IDE-darwin-arm64.zip
          retention-days: 7

  # =========================================================================
  # macOS x64 (Intel)
  # =========================================================================
  build-macos-x64:
    if: ${{ inputs.platforms == 'all' || inputs.platforms == 'macos-only' }}
    name: macOS x64
    runs-on: macos-13
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup native build environment
        run: node build/npm/preinstall.ts

      - name: Install extension dependencies
        run: node build/npm/postinstall.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_command: install

      - name: Build & Package
        run: npm run gulp vscode-darwin-x64

      - name: Create zip archive
        run: |
          src=$(dirname "$PWD")/VSCode-darwin-x64
          dst="$PWD/.build/Axon-IDE-darwin-x64.zip"
          cd "$src" && zip -r "$dst" .
          echo "Archive: $dst ($(stat -f%z "$dst") bytes)"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: Axon-IDE-darwin-x64
          path: .build/Axon-IDE-darwin-x64.zip
          retention-days: 7
